<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>嘿嘿</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0f0a1a 0%, #1a0a2e 40%, #2d1b4e 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .scene {
      position: relative;
      width: 420px;
      height: 400px;
    }

    .heart-dots {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 1px;
    }

    .dot {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #ff6b9d;
      box-shadow: 0 0 6px #ff6b9d;
      left: 0;
      top: 0;
      animation: twinkle 2s ease-in-out infinite;
    }
    .dot:nth-child(4n+1) { animation-delay: 0s; }
    .dot:nth-child(4n+2) { animation-delay: 0.3s; }
    .dot:nth-child(4n+3) { animation-delay: 0.6s; }
    .dot:nth-child(4n)   { animation-delay: 0.9s; }

    .name-dots {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 1px;
      height: 1px;
      z-index: 2;
    }

    .name-dot {
      position: absolute;
      width: 2.5px;
      height: 2.5px;
      border-radius: 50%;
      background: #ffb3d0;
      box-shadow: 0 0 8px #ff6b9d, 0 0 12px rgba(255, 182, 193, 0.8);
      left: 0;
      top: 0;
      animation: nameTwinkle 1.6s ease-in-out infinite;
    }
    .name-dot:nth-child(3n+1) { animation-delay: 0s; }
    .name-dot:nth-child(3n+2) { animation-delay: 0.25s; }
    .name-dot:nth-child(3n)   { animation-delay: 0.5s; }

    @keyframes twinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.7; transform: scale(0.9); }
    }

    @keyframes nameTwinkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.75; transform: scale(0.92); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="heart-dots" id="heartDots"></div>
    <div class="name-dots" id="nameDots"></div>
  </div>

  <script>
    (function () {
      function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
      function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)); }

      var scale = 11;
      var scatter = 0.25;
      var numOutline = 200;
      var numLayers = 16;
      var container = document.getElementById('heartDots');
      var dots = [];

      for (var layer = 0; layer < numLayers; layer++) {
        var r = 1 - (layer / numLayers) * 0.96;
        if (r < 0.04) r = 0.04;
        for (var i = 0; i < numOutline; i++) {
          var t = (i / numOutline) * 2 * Math.PI;
          var bx = heartX(t) * r * scale + (Math.random() - 0.5) * scatter;
          var by = heartY(t) * r * scale + (Math.random() - 0.5) * scatter;
          var dot = document.createElement('div');
          dot.className = 'dot';
          dot.style.left = bx + 'px';
          dot.style.top = by + 'px';
          container.appendChild(dot);
          dots.push([dot, bx, by]);
        }
      }

      // 用散点画「妮」
      var c = document.createElement('canvas');
      c.width = 160;
      c.height = 160;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 110px "Microsoft YaHei", "PingFang SC", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('妮', 80, 82);
      var data = ctx.getImageData(0, 0, 160, 160).data;
      var step = 4;
      var points = [];
      var minX = 160, minY = 160, maxX = 0, maxY = 0;
      for (var y = 0; y < 160; y += 1) {
        for (var x = 0; x < 160; x += 1) {
          var i = (y * 160 + x) * 4;
          if (data[i + 3] > 120) {
            if ((x + y) % step === 0) {
              points.push([x, y]);
              if (x < minX) minX = x;
              if (x > maxX) maxX = x;
              if (y < minY) minY = y;
              if (y > maxY) maxY = y;
            }
          }
        }
      }
      var cx = (minX + maxX) / 2;
      var cy = (minY + maxY) / 2;
      var nameScale = 0.9;
      var nameContainer = document.getElementById('nameDots');
      for (var k = 0; k < points.length; k++) {
        var px = (points[k][0] - cx) * nameScale;
        var py = (points[k][1] - cy) * nameScale;
        var nd = document.createElement('div');
        nd.className = 'name-dot';
        nd.style.left = px + 'px';
        nd.style.top = py + 'px';
        nameContainer.appendChild(nd);
      }

      var start = null;
      function breathe(timestamp) {
        if (!start) start = timestamp;
        var time = (timestamp - start) * 0.01;
        var breath = 0.06 * (1 + Math.sin(time));
        var s = 1 + breath;
        for (var j = 0; j < dots.length; j++) {
          dots[j][0].style.left = (dots[j][1] * s) + 'px';
          dots[j][0].style.top = (dots[j][2] * s) + 'px';
        }
        requestAnimationFrame(breathe);
      }
      requestAnimationFrame(breathe);
    })();
  </script>
</body>
</html>
