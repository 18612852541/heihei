<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>嘿嘿嘿</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0612;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    #c {
      display: block;
      width: 420px;
      height: 560px;
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(255, 107, 157, 0.15);
    }
  </style>
</head>
<body>
  <canvas id="c" width="420" height="560"></canvas>
  <script>
    (function () {
      var canvas = document.getElementById('c');
      var ctx = canvas.getContext('2d');
      var w = 420, h = 560, cx = w / 2, cy = h / 2;

      function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
      function heartY(t) { return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)); }

      var scale = 11, scatter = 0.1, numOutline = 240, numLayers = 20;
      var heartPoints = [];
      for (var layer = 0; layer < numLayers; layer++) {
        var r = 1 - (layer / numLayers) * 0.96;
        if (r < 0.04) r = 0.04;
        for (var i = 0; i < numOutline; i++) {
          var t = (i / numOutline) * 2 * Math.PI;
          heartPoints.push([
            heartX(t) * r * scale + (Math.random() - 0.5) * scatter,
            heartY(t) * r * scale + (Math.random() - 0.5) * scatter
          ]);
        }
      }

      var namePoints = [];
      var off = document.createElement('canvas');
      off.width = 160; off.height = 160;
      var octx = off.getContext('2d');
      octx.fillStyle = '#fff';
      octx.font = 'bold 110px "Microsoft YaHei", "PingFang SC", sans-serif';
      octx.textAlign = 'center';
      octx.textBaseline = 'middle';
      octx.fillText('妮', 80, 82);
      var data = octx.getImageData(0, 0, 160, 160).data;
      var step = 4, minX = 160, minY = 160, maxX = 0, maxY = 0;
      for (var y = 0; y < 160; y++) {
        for (var x = 0; x < 160; x++) {
          var i = (y * 160 + x) * 4;
          if (data[i + 3] > 120 && (x + y) % step === 0) {
            namePoints.push([x, y]);
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
          }
        }
      }
      var ncx = (minX + maxX) / 2, ncy = (minY + maxY) / 2;
      var nameScale = 0.9;
      for (var k = 0; k < namePoints.length; k++) {
        namePoints[k] = [
          (namePoints[k][0] - ncx) * nameScale,
          (namePoints[k][1] - ncy) * nameScale
        ];
      }

      var stars = [];
      for (var s = 0; s < 45; s++) {
        stars.push({
          x: Math.random() * w,
          y: Math.random() * h,
          r: 0.3 + Math.random() * 0.8,
          speed: 0.3 + Math.random() * 0.8
        });
      }

      var particles = [];
      var rockets = [];
      var colors = ['#ff6b9d', '#ffb3d0', '#ff9ed2', '#ffd700', '#fff5ee', '#ffccdd'];
      function spawnRocket() {
        rockets.push({
          x: w * 0.25 + Math.random() * w * 0.5,
          y: h + 8,
          vy: -4.2 - Math.random() * 1.2,
          trail: []
        });
      }
      function explodeAt(x, y) {
        var n = 42 + Math.floor(Math.random() * 24);
        for (var i = 0; i < n; i++) {
          var angle = Math.random() * Math.PI * 2;
          var sp = 2.2 + Math.random() * 3.8;
          particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * sp,
            vy: Math.sin(angle) * sp,
            life: 1, maxLife: 0.85 + Math.random() * 0.25,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: 1.2 + Math.random() * 1.6
          });
        }
      }

      var lastRocket = 0;
      var start = null;

      function draw(timestamp) {
        if (!start) start = timestamp;
        var time = (timestamp - start) * 0.001;
        var breath = 0.06 * (1 + Math.sin(time * 6));
        var s = 1 + breath;
        var glow = 4 + 4 * (1 + Math.sin(time * 6)) * 0.5;

        if (timestamp - lastRocket > 2200) {
          spawnRocket();
          lastRocket = timestamp;
        }

        for (var ri = rockets.length - 1; ri >= 0; ri--) {
          var rk = rockets[ri];
          rk.y += rk.vy;
          rk.trail.push({ x: rk.x, y: rk.y });
          if (rk.trail.length > 12) rk.trail.shift();
          if (rk.y < h * 0.52 || rk.y < 100) {
            explodeAt(rk.x, rk.y);
            rockets.splice(ri, 1);
          }
        }

        var g = ctx.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0, '#0a0614');
        g.addColorStop(0.35, '#120a1e');
        g.addColorStop(0.7, '#1e0a32');
        g.addColorStop(1, '#2a1248');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);

        for (var si = 0; si < stars.length; si++) {
          var star = stars[si];
          var tw = 0.4 + 0.6 * Math.sin(time * star.speed * 2 + si);
          ctx.fillStyle = 'rgba(255, 255, 255, ' + tw + ')';
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fill();
        }

        for (var ri = 0; ri < rockets.length; ri++) {
          var rk = rockets[ri];
          for (var ti = 0; ti < rk.trail.length; ti++) {
            var t = rk.trail[ti];
            ctx.globalAlpha = 0.3 + 0.5 * (ti / rk.trail.length);
            ctx.fillStyle = '#ffb3d0';
            ctx.beginPath();
            ctx.arc(t.x, t.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          ctx.fillStyle = '#fff5ee';
          ctx.shadowColor = '#ff6b9d';
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(rk.x, rk.y, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        for (var p = particles.length - 1; p >= 0; p--) {
          var pt = particles[p];
          pt.x += pt.vx;
          pt.y += pt.vy;
          pt.vy += 0.022;
          pt.vx *= 0.98;
          pt.vy *= 0.98;
          pt.life -= 0.014;
          if (pt.life <= 0) {
            particles.splice(p, 1);
            continue;
          }
          var a = pt.life / pt.maxLife;
          ctx.globalAlpha = a;
          ctx.fillStyle = pt.color;
          ctx.shadowColor = pt.color;
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;

        var vig = ctx.createRadialGradient(cx, cy, w * 0.35, cx, cy, w * 1.1);
        vig.addColorStop(0, 'rgba(0,0,0,0)');
        vig.addColorStop(0.55, 'rgba(0,0,0,0)');
        vig.addColorStop(1, 'rgba(0,0,0,0.35)');
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.translate(cx, cy);

        var halo = ctx.createRadialGradient(0, 0, 0, 0, 0, 120);
        halo.addColorStop(0, 'rgba(255, 107, 157, 0.12)');
        halo.addColorStop(0.5, 'rgba(255, 107, 157, 0.04)');
        halo.addColorStop(1, 'rgba(255, 107, 157, 0)');
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(0, 0, 120, 0, Math.PI * 2);
        ctx.fill();

        var twinkle = 0.82 + 0.18 * Math.sin(time * 8);
        ctx.shadowColor = 'rgba(255, 107, 157, 0.95)';
        ctx.shadowBlur = glow;
        ctx.fillStyle = '#ff6b9d';
        for (var j = 0; j < heartPoints.length; j++) {
          var px = heartPoints[j][0] * s, py = heartPoints[j][1] * s;
          ctx.globalAlpha = twinkle * (0.92 + 0.08 * Math.sin(j * 0.2 + time * 3));
          ctx.beginPath();
          ctx.arc(px, py, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        ctx.shadowColor = 'rgba(255, 182, 193, 0.9)';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#ffcce0';
        for (var n = 0; n < namePoints.length; n++) {
          var nx = namePoints[n][0], ny = namePoints[n][1];
          ctx.globalAlpha = 0.92 + 0.08 * Math.sin(time * 5 + n * 0.08);
          ctx.beginPath();
          ctx.arc(nx, ny, 1.25, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        ctx.restore();

        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
